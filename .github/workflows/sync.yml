name: Sync to Pterodactyl game servers

on:
  push:
    branches:
      - main  # Change to 'master' if your branch is named master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Checks out your code so the action can see the files
      - uses: actions/checkout@v2
      
      # Runs the sync action
      - name: Sync to Pterodactyl game servers
        uses: zodtf/ptero-sync@v1
        with:
          api_key: ${{ secrets.PTERODACTYL_API_KEY }}
          ptero_url: ${{ secrets.PTERODACTYL_URL }}
          send_path: 'world/customnpcs/scripts/ecmascript'          # CHANGE THIS: '.' for root, or './dist' for build folders
          server_ids: 'dacbcbbc-1775-4dc6-9a6e-e570cab05a72'          # CHANGE THIS: Your actual Server ID (e.g., '5' or '5,6,7')   
