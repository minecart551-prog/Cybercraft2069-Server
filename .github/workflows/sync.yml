name: Deploy via SFTP

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # CRITICAL: fetch-depth: 0 is required to get git history for timestamp restoration
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Sync CNPC via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USERNAME }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: "./world/customnpcs/scripts/ecmascript"
          remoteDir: "/world/customnpcs/scripts/ecmascript"
          # Ensures only newer files are uploaded
          onlyNewer: true

          options: "--delete --exclude .git/" 
          
      - name: Sync KubeJS via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USERNAME }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: "./kubejs"
          remoteDir: "/kubejs"
          onlyNewer: true
          options: "--delete --exclude .git/"

      - name: Sync datapack via SFTP
        uses: pressidium/lftp-mirror-action@v1
        with:
          host: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          user: ${{ secrets.SFTP_USERNAME }}
          pass: ${{ secrets.SFTP_PASSWORD }}
          localDir: "./world/datapacks"
          remoteDir: "/world/datapacks"
          onlyNewer: true
          options: "--delete --exclude .git/" 
